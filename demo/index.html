<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tex2math WebAssembly Demo</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
            background-color: #f9fafb;
            color: #333;
        }
        h1 { margin-bottom: 0.5rem; }
        .description { color: #666; margin-bottom: 1.5rem; }
        
        .container {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .editor-section {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        textarea {
            width: 100%;
            height: 150px;
            padding: 1rem;
            font-family: monospace;
            font-size: 1rem;
            border: 1px solid #d1d5db;
            border-radius: 0.5rem;
            resize: vertical;
            box-sizing: border-box;
        }

        textarea:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        .options {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.95rem;
            color: #4b5563;
        }

        .output-section {
            background-color: white;
            border: 1px solid #d1d5db;
            border-radius: 0.5rem;
            padding: 1.5rem;
            min-height: 150px;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            overflow-x: auto;
        }

        .output-section h2 {
            font-size: 1rem;
            margin-top: 0;
            color: #6b7280;
            border-bottom: 1px solid #e5e7eb;
            padding-bottom: 0.5rem;
            margin-bottom: 1rem;
        }

        #math-output {
            font-size: 1.5rem; /* Make formulas larger */
        }

        .error {
            color: #ef4444;
            font-family: monospace;
            background-color: #fef2f2;
            padding: 1rem;
            border-radius: 0.25rem;
        }
        
        /* Optional: Hide raw MathML source to keep it clean */
        #mathml-source {
            margin-top: 1rem;
            padding: 1rem;
            background: #1e1e1e;
            color: #d4d4d4;
            border-radius: 0.5rem;
            font-family: monospace;
            white-space: pre-wrap;
            display: none;
        }
        #show-source-btn:checked ~ #mathml-source {
            display: block;
        }
    </style>
</head>
<body>

    <h1>🚀 tex2math WASM Demo</h1>
    <p class="description">
        Type LaTeX in the editor below. It is translated <strong>instantly in your browser</strong> using WebAssembly generated from Rust!
    </p>

    <div class="container">
        <div class="editor-section">
            <textarea id="latex-input" spellcheck="false">\int_{0}^{\infty} e^{-x^2} dx = \frac{\sqrt{\pi}}{2}</textarea>
            <div class="options">
                <input type="checkbox" id="display-mode" checked>
                <label for="display-mode">Display Mode (Block Equation)</label>
                
                <span style="margin: 0 0.5rem;">|</span>
                
                <input type="checkbox" id="show-source-btn">
                <label for="show-source-btn">Show Raw MathML</label>
            </div>
        </div>

        <div class="output-section">
            <h2>Rendered Output (Native MathML)</h2>
            <!-- The actual MathML will be injected here. Browsers natively render it! -->
            <div id="math-output">Loading WebAssembly module...</div>
            <div id="mathml-source"></div>
        </div>
    </div>

    <!-- We use ES Modules to import the WASM package built by wasm-pack -->
    <script type="module">
        import init, { convert_to_mathml } from '../pkg/tex2math.js';

        async function run() {
            try {
                // Initialize the WASM module
                await init();
                
                const input = document.getElementById('latex-input');
                const displayCheckbox = document.getElementById('display-mode');
                const output = document.getElementById('math-output');
                const sourceOutput = document.getElementById('mathml-source');

                function update() {
                    const latex = input.value.trim();
                    const isDisplay = displayCheckbox.checked;

                    if (!latex) {
                        output.innerHTML = '';
                        sourceOutput.textContent = '';
                        return;
                    }

                    try {
                        // Call our Rust function via WASM!
                        const mathml = convert_to_mathml(latex, isDisplay);
                        
                        output.innerHTML = mathml;
                        output.classList.remove('error');
                        
                        // Also show raw MathML for debugging
                        sourceOutput.textContent = formatXml(mathml);
                        
                    } catch (e) {
                        // The Rust Result::Err translates to a JS exception thrown
                        output.innerHTML = e.toString();
                        output.classList.add('error');
                        sourceOutput.textContent = '';
                    }
                }

                input.addEventListener('input', update);
                displayCheckbox.addEventListener('change', update);

                // Initial render
                update();
            } catch (err) {
                document.getElementById('math-output').innerHTML = `
                    <div class="error">Failed to load WebAssembly: ${err}</div>
                `;
            }
        }
        
        // Helper to format XML purely for display
        function formatXml(xml) {
            let formatted = '';
            let pad = 0;
            xml.split(/>\s*</).forEach(function(node) {
                if (node.match( /^\/\w/ )) pad -= 1;
                formatted += '  '.repeat(pad) + '<' + node + '>\r\n';
                if (node.match( /^<?\w[^>]*[^\/]$/ )) pad += 1;
            });
            return formatted.substring(1, formatted.length-3);
        }

        run();
    </script>
</body>
</html>
