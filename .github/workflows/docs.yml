name: Docs

on:
  push:
    branches: ["main"]

# 允许这个工作流并发写入 GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 防止同一个分支的后续提交产生竞争
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # 第一步：构建文档
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build documentation
        # --no-deps 防止编译所有依赖项的文档，节省时间和空间
        # --document-private-items 可以在内部开发时生成完整文档，可选
        run: cargo doc --no-deps --release

      - name: Redirect index
        # 默认情况下 cargo doc 会生成在 target/doc/<包名> 下
        # 我们写一个极简的 index.html 在文档根目录，让访问者打开主页就能跳转到 tex2math 文档
        run: |
          echo '<meta http-equiv="refresh" content="0; url=tex2math/index.html">' > target/doc/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 我们上传的目录就是 cargo 生成的静态文件目录
          path: './target/doc'

  # 第二步：将文档部署到 GitHub Pages
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
